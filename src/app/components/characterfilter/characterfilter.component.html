<div class="filter-wrapper">
  <h2>Harry Potter Characters Filter</h2>

  <mat-form-field appearance="outline" class="filter-field">
    <mat-label>Select House</mat-label>
    <mat-select [formControl]="houseControl" (selectionChange)="onHouseChange()">
      <mat-option value="">All Houses</mat-option>
      @for (house of houses; track house) {
        <mat-option [value]="house">{{ house }}</mat-option>
      }
    </mat-select>
  </mat-form-field>
</div>
